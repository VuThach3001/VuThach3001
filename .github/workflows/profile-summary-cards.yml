name: GitHub-Profile-Summary-Cards

on:
  schedule: # execute every 24 hours
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-profile-summary-cards
    permissions:
      contents: write

    steps:
      - name: Validate summary token
        shell: bash
        env:
          SUMMARY_GITHUB_TOKEN: ${{ secrets['profile-summary-cards-token'] }}
        run: |
          if [ -z "$SUMMARY_GITHUB_TOKEN" ]; then
            echo "::error title=Missing profile-summary-cards-token::Create a repository secret named profile-summary-cards-token. Use a classic personal access token with scopes public_repo, read:user, and user:email."
            exit 1
          fi

          status="$(curl -sS -o /tmp/github-user.json -w '%{http_code}' \
            -H \"Authorization: Bearer $SUMMARY_GITHUB_TOKEN\" \
            -H \"Accept: application/vnd.github+json\" \
            https://api.github.com/user)"

          if [ "$status" != "200" ]; then
            echo "::error title=Invalid profile-summary-cards-token::GitHub API returned HTTP $status. Replace the secret with a valid classic personal access token that has public_repo, read:user, and user:email."
            cat /tmp/github-user.json
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          token: ${{ secrets['profile-summary-cards-token'] }}

      - uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          GITHUB_TOKEN: ${{ secrets['profile-summary-cards-token'] }}
        with:
          USERNAME: ${{ github.repository_owner }}
          BRANCH_NAME: main
          AUTO_PUSH: true